<svg width="960" height="640" viewBox="0 0 960 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Workforce demand and supply curve</title>
  <desc id="desc">Graph showing labor demand and improved supply alignment with better planning data.</desc>
  <rect width="960" height="640" fill="#fffdf8"/>
  <rect x="80" y="40" width="820" height="560" rx="22" fill="#fff" stroke="#e8dbc9" stroke-width="3"/>

  <line x1="170" y1="520" x2="820" y2="520" stroke="#35424e" stroke-width="5"/>
  <line x1="170" y1="520" x2="170" y2="120" stroke="#35424e" stroke-width="5"/>
  <polygon points="820,520 796,510 796,530" fill="#35424e"/>
  <polygon points="170,120 160,144 180,144" fill="#35424e"/>

  <path d="M210 460 C 340 395, 450 305, 700 170" fill="none" stroke="#2f8f79" stroke-width="9" stroke-linecap="round"/>
  <path d="M210 175 C 360 270, 530 380, 760 470" fill="none" stroke="#2d68b1" stroke-width="9" stroke-linecap="round"/>
  <path d="M250 420 C 380 345, 500 250, 730 145" fill="none" stroke="#f0a24e" stroke-width="8" stroke-dasharray="18 12" stroke-linecap="round"/>

  <circle cx="495" cy="314" r="10" fill="#c74f36"/>
  <line x1="495" y1="314" x2="495" y2="520" stroke="#b8a898" stroke-width="3" stroke-dasharray="8 8"/>
  <line x1="170" y1="314" x2="495" y2="314" stroke="#b8a898" stroke-width="3" stroke-dasharray="8 8"/>

  <text x="84" y="92" fill="#2a1b12" font-size="42" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Workforce Supply and Demand</text>
  <text x="588" y="167" fill="#2f8f79" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Supply</text>
  <text x="640" y="462" fill="#2d68b1" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Demand</text>
  <text x="606" y="126" fill="#f0a24e" font-size="23" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Data-informed supply shift</text>
  <text x="838" y="548" fill="#4d4138" font-size="24" font-family="Segoe UI, Arial, sans-serif">Employment load</text>
  <text transform="translate(104 448) rotate(-90)" fill="#4d4138" font-size="24" font-family="Segoe UI, Arial, sans-serif">Wage / labor cost pressure</text>
  <text x="505" y="554" fill="#7a6759" font-size="24" font-family="Segoe UI, Arial, sans-serif">Equilibrium staffing</text>
</svg>
